name: Jobdori Monitoring

on:
  workflow_dispatch:  # 수동 실행
  schedule:
    # 평일(월-금) 아침 9시 (KST) = UTC 0시
    - cron: '0 23 * * 0-4'

jobs:
  monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Run Full Pipeline
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: npm run run-pipeline

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monitoring-results-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🔍 Jobdori 모니터링 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ⏱️ 실행 시간: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 트리거: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 상태: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 생성된 파일" >> $GITHUB_STEP_SUMMARY
          if [ -d "output" ]; then
            ls -la output/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(파일 없음)" >> $GITHUB_STEP_SUMMARY
          else
            echo "(output 디렉토리 없음)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [대시보드 바로가기](https://jobdori.vercel.app)" >> $GITHUB_STEP_SUMMARY
